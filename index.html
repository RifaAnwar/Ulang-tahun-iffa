<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Iffa Najwa Mufida ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { --gold: #d4af37; --dark: #0f0f0f; --glass: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: radial-gradient(circle at center, #1a0b0b, #000000);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Playfair Display', serif; overflow: hidden; color: #fff;
            position: fixed; width: 100%; /* Mencegah seluruh halaman goyang saat scroll box */
        }

        .particles { position: absolute; width: 100%; height: 100%; z-index: 0; }
        .particle { position: absolute; background: var(--gold); border-radius: 50%; opacity: 0.3; animation: floatUp 10s infinite linear; }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: 1s;
        }
        .start-btn {
            padding: 15px 40px; font-size: 1.5rem; background: transparent;
            color: var(--gold); border: 2px solid var(--gold); border-radius: 50px;
            cursor: pointer; font-family: 'Great Vibes', cursive; box-shadow: 0 0 15px var(--gold);
        }

        .card {
            background: var(--glass); backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 20px;
            padding: 20px; text-align: center; max-width: 380px; width: 90%;
            z-index: 10; opacity: 0; transform: scale(0.8); transition: 1.2s;
        }
        .card.visible { opacity: 1; transform: scale(1); }

        .photo-frame { width: 110px; height: 110px; margin: 0 auto 10px; border-radius: 50%; border: 2px solid var(--gold); padding: 3px; }
        .photo-frame img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        h1 { font-family: 'Great Vibes', cursive; font-size: 2.5rem; color: var(--gold); margin-bottom: 5px; }

        /* PERBAIKAN SCROLL HP */
        .message-box { 
            background: rgba(0,0,0,0.6); 
            padding: 15px; 
            border-radius: 12px; 
            margin: 15px 0; 
            height: 160px; /* Tinggi tetap agar scroll konsisten */
            overflow-y: scroll; /* Paksa scroll muncul */
            -webkit-overflow-scrolling: touch; /* Scroll halus di iPhone/HP */
            text-align: left; 
            border-left: 3px solid var(--gold);
            position: relative;
            z-index: 20;
        }

        .message-box::-webkit-scrollbar { width: 4px; }
        .message-box::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        #typing-text { 
            font-style: italic; 
            line-height: 1.7; 
            font-size: 0.95rem; 
            white-space: pre-wrap; 
            padding-bottom: 20px; /* Ruang ekstra di bawah teks */
        }

        .btn-love { background: linear-gradient(45deg, #d4af37, #f9f295); color: #000; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h2 style="color:var(--gold); margin-bottom:20px;">A Gift for You</h2>
        <button class="start-btn" onclick="startSurprise()">Open ❤️</button>
    </div>

    <audio id="mySong" src="musik.mp3" preload="auto" loop></audio>

    <div class="particles" id="particle-container"></div>

    <div class="card" id="main-card">
        <div class="photo-frame">
            <img src="https://i.imgur.com/28I8Qvo.jpeg" alt="Love">
        </div>
        <h1>Happy Birthday</h1>
        <div class="message-box" id="scroll-box">
            <p id="typing-text"></p>
        </div>
        <button class="btn-love" onclick="makeConfetti()">I Love You ❤️</button>
        <p style="margin-top: 15px; font-family: 'Great Vibes', cursive; color: var(--gold); font-size: 1.1rem;">✨ Iffa Najwa Mufida ✨</p>
    </div>

    <script>
        function createParticles() {
            const container = document.getElementById('particle-container');
            for (let i = 0; i < 25; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.width = '3px'; p.style.height = '3px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 5 + 5) + 's';
                container.appendChild(p);
            }
        }

        function startSurprise() {
            document.getElementById('start-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-overlay').style.display = 'none';
                document.getElementById('main-card').classList.add('visible');
                document.getElementById('mySong').play();
                typeWriter();
                makeConfetti();
            }, 1000);
        }

        const message = "Selamat ulang tahun ya. ❤️\n\nHari ini mungkin cuma hari di mana umurmu bertambah satu tahun, tapi buatku hari ini adalah hari di mana seseorang yang sangat berharga lahir ke dunia.\n\nAku berdoa semoga Allah selalu menjaga kamu, memberi kesehatan, kebahagiaan, dan mempermudah setiap langkah yang kamu jalani. Semoga semua yang kamu impikan perlahan menjadi nyata, dan hidupmu selalu dipenuhi hal-hal baik.\n\nAku mungkin belum jadi orang yang paling dekat di hidupmu. Tapi percayalah, kamu adalah salah satu orang yang selalu aku sebut dalam doa. Semoga di setiap langkahmu selalu ada kebahagiaan.\n\nDan kalau suatu hari nanti Allah mengizinkan, semoga aku bisa jadi seseorang yang berjalan di sampingmu, bukan hanya mendoakanmu dari jauh.\n\nSekali lagi, selamat ulang tahun. Semoga hari ini penuh senyum, dan semoga aku bisa jadi salah satu alasan kamu tersenyum hari ini. 🤍✨ 🌙✨";

        let i = 0;
        function typeWriter() {
            if (i < message.length) {
                const textElem = document.getElementById("typing-text");
                const scrollBox = document.getElementById("scroll-box");
                
                textElem.innerHTML += message.charAt(i);
                i++;
                
                // Perbaikan auto-scroll untuk mobile
                scrollBox.scrollTo({
                    top: scrollBox.scrollHeight,
                    behavior: 'smooth'
                });
                
                setTimeout(typeWriter, 45);
            }
        }

        function makeConfetti() {
            confetti({ particleCount: 100, spread: 60, origin: { y: 0.7 }, colors: ['#d4af37', '#ffffff'] });
            document.getElementById('mySong').play();
        }

        createParticles();
    </script>
</body>
</html>
